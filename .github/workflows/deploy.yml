name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: immiglensFE/package-lock.json

      - name: Install frontend dependencies
        working-directory: immiglensFE
        run: npm ci

      - name: Build frontend
        working-directory: immiglensFE
        run: npm run build
        env:
          VITE_API_BASE: ''

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app/immiglens
            git pull origin main

            # Update Python dependencies if requirements changed
            cd /app/immiglens/immiglensBE
            .venv/bin/pip install -r requirements.txt --quiet

            # Run Alembic migrations BEFORE restarting the service.
            # alembic upgrade head is idempotent — safe to run on every deploy.
            PYTHONPATH=/app/immiglens/immiglensBE .venv/bin/alembic upgrade head

            # Restart backend
            sudo systemctl restart immiglens

      - name: Upload built frontend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "immiglensFE/dist/*"
          target: "/var/www/immiglens"
          strip_components: 2
          overwrite: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: sudo systemctl reload nginx
