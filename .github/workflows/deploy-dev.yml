name: Deploy to DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev:
    name: Build & Deploy → DEV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: immiglensFE/package-lock.json

      - name: Install frontend dependencies
        working-directory: immiglensFE
        run: npm ci

      - name: Build frontend
        working-directory: immiglensFE
        run: npm run build
        env:
          VITE_API_BASE: ''

      - name: Deploy backend to DEV EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: |
            cd /app/immiglens
            git pull origin dev

            cd /app/immiglens/immiglensBE
            .venv/bin/pip install -r requirements.txt --quiet

            PYTHONPATH=/app/immiglens/immiglensBE .venv/bin/alembic upgrade head

            sudo systemctl restart immiglens

      - name: Ensure webroot is writable
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: sudo mkdir -p /var/www/immiglens && sudo chown -R ubuntu:ubuntu /var/www/immiglens

      - name: Upload frontend to DEV EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          source: "immiglensFE/dist/*"
          target: "/var/www/immiglens"
          strip_components: 2
          overwrite: true

      - name: Reload Nginx on DEV
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: sudo systemctl reload nginx
