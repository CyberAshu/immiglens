# Alembic configuration file for ImmigLens backend.
# The database URL is intentionally NOT set here — it is read from the .env
# file (DATABASE_URL) inside migrations/env.py via app.core.config.settings.

[alembic]
script_location = migrations

# Human-readable revision file names: YYYY_MM_DD_HHMM-<rev>_<slug>.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Encode migration scripts as UTF-8
output_encoding = utf-8

# Leave blank — overridden in env.py
sqlalchemy.url =

[post_write_hooks]
# (optional) run black on newly generated scripts
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
